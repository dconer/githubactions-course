name: Upload Stats Artifact

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6

      - name: Install dependencies
        run: |
          pwd
          cd react-app
          npm install

      - name: Run tests
        run: npm test --if-present
        continue-on-error: true

      - name: Build project
        run: npm run build --if-present
        continue-on-error: true

      - name: Generate stats CSV
        run: |
          echo "metric,value" > stats.csv
          echo "workflow,${{ github.workflow }}" >> stats.csv
          echo "run_id,${{ github.run_id }}" >> stats.csv
          echo "run_number,${{ github.run_number }}" >> stats.csv
          echo "repository,${{ github.repository }}" >> stats.csv
          echo "branch,${{ github.ref_name }}" >> stats.csv
          echo "commit,${{ github.sha }}" >> stats.csv
          echo "actor,${{ github.actor }}" >> stats.csv
          echo "runner_os,${{ runner.os }}" >> stats.csv
          echo "node_version,$(node -v)" >> stats.csv
          echo "date,$(date -u)" >> stats.csv

      - name: Upload stats artifact
        uses: actions/upload-artifact@v4
        with:
          name: workflow-stats
          path: stats.csv
      - name: get metadata
        run: |
          pwd
          ls -al
          cd react-app/
          ls -al

      - name: Upload  build file
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: react-app/build
